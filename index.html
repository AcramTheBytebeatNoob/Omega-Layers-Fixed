<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Omega Layers V2.1: Exponential Growth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-tip">Tipp: Höhere Layer beschleunigen die unteren!</div>

    <div class="stats-panel">
        Prestige-Level: <span id="p-level">0</span> | Rabatt: <span id="p-mult">100</span>%
    </div>

    <div class="main-display">
        <div id="row-omega" class="layer-row"><span>ω</span> <span id="val-omega" class="val">0</span></div>
        <div id="row-psi" class="layer-row"><span>ψ</span> <span id="val-psi" class="val">0</span></div>
        <div id="row-chi" class="layer-row"><span>χ</span> <span id="val-chi" class="val">0</span></div>
        <div id="row-phi" class="layer-row"><span>φ</span> <span id="val-phi" class="val">0</span></div>
        <div id="row-upsilon" class="layer-row"><span>υ</span> <span id="val-upsilon" class="val">0</span></div>
        <div id="row-tau" class="layer-row"><span>τ</span> <span id="val-tau" class="val">0</span></div>
        <div id="row-sigma" class="layer-row"><span>σ</span> <span id="val-sigma" class="val">0</span></div>
        <div id="row-rho" class="layer-row"><span>ρ</span> <span id="val-rho" class="val">0</span></div>
        <div id="row-pi" class="layer-row"><span>π</span> <span id="val-pi" class="val">0</span></div>
        <div id="row-omicron" class="layer-row"><span>ο</span> <span id="val-omicron" class="val">0</span></div>
        <div id="row-xi" class="layer-row"><span>ξ</span> <span id="val-xi" class="val">0</span></div>
        <div id="row-nu" class="layer-row"><span>ν</span> <span id="val-nu" class="val">0</span></div>
        <div id="row-mu" class="layer-row"><span>μ</span> <span id="val-mu" class="val">0</span></div>
        <div id="row-lambda" class="layer-row"><span>λ</span> <span id="val-lambda" class="val">0</span></div>
        <div id="row-kappa" class="layer-row"><span>κ</span> <span id="val-kappa" class="val">0</span></div>
        <div id="row-iota" class="layer-row"><span>ι</span> <span id="val-iota" class="val">0</span></div>
        <div id="row-theta" class="layer-row"><span>θ</span> <span id="val-theta" class="val">0</span></div>
        <div id="row-eta" class="layer-row"><span>η</span> <span id="val-eta" class="val">0</span></div>
        <div id="row-zeta" class="layer-row"><span>ζ</span> <span id="val-zeta" class="val">0</span></div>
        <div id="row-epsilon" class="layer-row"><span>ε</span> <span id="val-epsilon" class="val">0</span></div>
        <div id="row-delta" class="layer-row"><span>δ</span> <span id="val-delta" class="val">0</span></div>
        <div id="row-gamma" class="layer-row"><span>γ</span> <span id="val-gamma" class="val">0</span></div>
        <div id="row-beta" class="layer-row"><span>β</span> <span id="val-beta" class="val">0</span></div>
        <div id="row-alpha" class="layer-row"><span>α</span> <span id="val-alpha" class="val">0</span></div>
    </div>

    <div class="button-grid" id="btn-container"></div>
    
    <div class="actions">
        <button id="prestige-btn" class="prestige-btn">PRESTIGE (OPFERE ι)</button>
        <div id="auto-status" style="display:none; color:#ffca00; margin-top:15px; font-weight:bold;">AUTO-BUYER & PASSIVE PRODUKTION AKTIV</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
